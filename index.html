<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Supplement Tracker — VHM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=2">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="topbar-brand">
        <div class="topbar-ico">💊</div>
        <div>
          <div class="topbar-title">Supplement Tracker</div>
          <div class="topbar-sub">Vitamin · Protein · Daily Stack</div>
        </div>
      </div>
      <div class="topbar-auth">
        <span id="auth-user-label" style="font-size:12px;color:var(--t2)">Belum login</span>
        <button id="auth-action-btn" onclick="onAuthBtnClick()" class="btn btn-sm">Login</button>
      </div>
    </div>

    <div class="tabs" id="tabs-root"></div>
    <div id="panels-root"></div>
  </div>

  <!-- Auth Modal -->
  <div id="auth-modal" class="modal-overlay" onclick="if(event.target===this)closeAuthModal()">
    <div class="modal-box">
      <button class="modal-close" onclick="closeAuthModal()">✕</button>
      <div class="modal-title">Login</div>
      <div class="modal-sub">Pakai akun yang sama dengan app peptide/exercise (single Supabase).</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin:14px 0">
        <input id="auth-email" type="email" placeholder="email" class="input">
        <input id="auth-password" type="password" placeholder="password" class="input">
        <div id="auth-err" style="font-size:11px;color:var(--warn);min-height:14px"></div>
      </div>
      <button onclick="doLogin()" class="btn btn-primary btn-block">Sign In</button>
    </div>
  </div>

  <!-- Supplement Edit Modal -->
  <div id="supp-edit-modal" class="modal-overlay" onclick="if(event.target===this)closeSuppEdit()">
    <div class="modal-box" style="max-width:520px">
      <button class="modal-close" onclick="closeSuppEdit()">✕</button>
      <div class="modal-title" id="supp-edit-title">Edit Supplement</div>
      <input type="hidden" id="supp-edit-id">
      <div class="form-grid">
        <div class="form-row"><label>Name</label><input id="se-name" class="input"></div>
        <div class="form-row"><label>Category</label>
          <select id="se-cat" class="input">
            <option value="vitamin">Vitamin</option>
            <option value="protein">Protein</option>
            <option value="creatine">Creatine</option>
            <option value="eaa">EAA</option>
            <option value="preworkout">Pre-workout</option>
            <option value="omega">Omega/Fish Oil</option>
            <option value="mineral">Mineral</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-row"><label>Brand</label><input id="se-brand" class="input"></div>
        <div class="form-row"><label>Unit</label>
          <select id="se-unit" class="input">
            <option value="tablet">tablet</option>
            <option value="capsule">capsule</option>
            <option value="scoop">scoop</option>
            <option value="drop">drop</option>
            <option value="ml">ml</option>
            <option value="g">g</option>
          </select>
        </div>
        <div class="form-row"><label>Dose / serving</label><input id="se-dose" type="number" step="0.01" class="input"></div>
        <div class="form-row"><label>Dose unit</label>
          <select id="se-doseunit" class="input">
            <option value="g">g</option>
            <option value="mg">mg</option>
            <option value="mcg">mcg</option>
            <option value="IU">IU</option>
            <option value="tablet">tablet</option>
            <option value="scoop">scoop</option>
          </select>
        </div>
        <div class="form-row"><label>Servings/container</label><input id="se-servings" type="number" class="input"></div>
        <div class="form-row"><label>Price (IDR)</label><input id="se-price" type="number" class="input"></div>
        <div class="form-row"><label>Score (0-100)</label><input id="se-score" type="number" min="0" max="100" class="input" placeholder="e.g. 85"></div>
        <div class="form-row form-row-wide"><label>Timing</label><input id="se-timing" class="input" placeholder="e.g. Post-workout, Pagi"></div>
        <div class="form-row form-row-wide"><label>Notes</label><textarea id="se-notes" class="input" rows="2"></textarea></div>
      </div>
      <div id="supp-edit-err" style="font-size:11px;color:var(--warn);min-height:14px;margin:8px 0"></div>
      <div class="modal-actions">
        <button onclick="closeSuppEdit()" class="btn btn-ghost">Batal</button>
        <button onclick="saveSuppEdit()" class="btn btn-primary">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Inventory Edit Modal -->
  <div id="inv-modal" class="modal-overlay" onclick="if(event.target===this)closeInvModal()">
    <div class="modal-box">
      <button class="modal-close" onclick="closeInvModal()">✕</button>
      <div class="modal-title" id="inv-modal-title">Update Stok</div>
      <input type="hidden" id="inv-supp-id">
      <div class="form-grid">
        <div class="form-row"><label>Qty containers (botol/jar)</label><input id="inv-qty" type="number" min="0" class="input"></div>
        <div class="form-row"><label>Min threshold (alert)</label><input id="inv-thr" type="number" min="0" value="1" class="input"></div>
      </div>
      <div class="modal-actions">
        <button onclick="closeInvModal()" class="btn btn-ghost">Batal</button>
        <button onclick="saveInv()" class="btn btn-primary">Simpan</button>
      </div>
    </div>
  </div>

  <!-- Log Modal -->
  <div id="log-modal" class="modal-overlay" onclick="if(event.target===this)closeLogModal()">
    <div class="modal-box">
      <button class="modal-close" onclick="closeLogModal()">✕</button>
      <div class="modal-title" id="log-modal-title">Catat Konsumsi</div>
      <input type="hidden" id="log-supp-id">
      <div class="form-grid">
        <div class="form-row"><label>Qty serving</label><input id="log-qty" type="number" step="0.5" value="1" class="input"></div>
        <div class="form-row"><label>Tanggal/jam</label><input id="log-when" type="datetime-local" class="input"></div>
        <div class="form-row form-row-wide"><label>Notes</label><input id="log-notes" class="input" placeholder="opsional"></div>
      </div>
      <div class="modal-actions">
        <button onclick="closeLogModal()" class="btn btn-ghost">Batal</button>
        <button onclick="saveLog()" class="btn btn-primary">Catat</button>
      </div>
    </div>
  </div>

  <div id="save-ind" class="save-ind">✓ Tersimpan</div>
  <div id="app-version" class="app-version">v=2</div>

  <script type="module" src="js/main.js?v=2"></script>
</body>
</html>
